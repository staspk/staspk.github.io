<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- Title -->
    <title>Stanislav Kozubenko</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="favicons/favicon.ico">
    <meta name="msapplication-TileColor" content="#2b5797">
    <meta name="msapplication-config" content="favicons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/libraries/bootstrap-4.1.3.css">    <!-- Bootstrap -->
    <link rel="stylesheet" href="css/libraries/animate.css">            <!-- Animate.css -->
    <link rel="stylesheet" href="css/libraries/jquery-ui.css">          <!-- Jquery UI -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">      <!-- Font Awesome -->
    
    <link rel="stylesheet" href="css/shared-styles.css">                <!-- MyStyles -->
    <link rel="stylesheet" href="css/intro-page-styles.css">
    <link rel="stylesheet" href="css/main-page-styles.css">
    <link rel="stylesheet" href="css/contact-page-styles.css">
</head>

<body> 
    <canvas id="main_canvas"></canvas>  <!-- For Starfield -->

    <div class="center" id="introPage" style="width: 50px; height: 200px">
        <button type="button" class="btn btn-danger shadow-none" onclick="event.preventDefault(); enterMainPage();">ENTER</button>
        <p class="bold" style="width: 200px; color: #b175dad7; font-size: 18px;">Audio Recommended</p>   
    </div>

    <div class="center" id="mainPage" style="width: 400px; height: 400px;">
        <div class="container-fluid" id="intro">
            <div class="row">
                <div class="col">
                    <img id="ewuLogo" src="./images/eagle-red.svg">
                </div>
                <div id="nameHolder" class="col">
                    <a class="twinkle-sound" id="firstName-mainPage" href="" onclick="event.preventDefault();"><h1>Stanislav</h1></a> 
                    <a class="twinkle-sound" id="lastName-mainPage" href="" onclick="event.preventDefault();"><h1>Kozubenko</h1></a> 
                </div>
            </div>
            <div class="row" id="linkRow">
                <a class="bold hover-sound" id="link1" href="" onclick="closeMainPage(event, 1)"> Work Experience</a>
                <a class="bold hover-sound" id="link2" href="" onclick="closeMainPage(event, 2)"> Education</a>
                <a class="bold hover-sound" id="link3" href="" onclick="closeMainPage(event, 3)"> Project Highlights</a>
                <a class="bold hover-sound" id="link4" href="" onclick="closeMainPage(event, 4)"> Contact Me</a>
            </div>
        </div>
    </div>


    <div class="center" id="contactMePage">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title" id="myModalLabel">Contact Me</h4>
                    <button class="close" data-dismiss="modal" type="button" onclick="event.preventDefault(); closeContactMePage();"><span class="pageCloser">X</span></button>
                </div>
                <div class="modal-body">
                    <form id="Contactmeform" action="https://formspree.io/staspk@gmail.com" method="POST">
                        <div class="input-group margin-bottom-sm"><span class="input-group-addon"><i class="fa fa-2x fa-user fa-fw offset-my-fa"></i></span><input class="form-control" id="UN" type="text" placeholder="Enter Your Name" name="name" autocomplete="off" /></div><br/>
                        <div class="input-group margin-bottom-sm"><span class="input-group-addon"><i class="fa fa-2x fa-envelope-o fa-fw offset-my-fa"></i></span><input class="form-control" id="CME" type="text" placeholder="Enter Your Email Address" name="email" autocomplete="off" /></div><br/><label for="contact-me-message-area">Email Contents:</label>
                        <textarea class="form-control" id="contact-me-message-area" rows="5" name="message" onkeyup="countChar(this)" maxlength="300"></textarea>

                        <div class="text-centered"><button class="btn btn-md btn-danger shadow-none onclickspin" type="submit" id="CMSub">SUBMIT</button></div>
                    </form>
                </div>
                <div class="modal-footer"><a href="www.linkedin.com/in/stanislav-kozubenko"><i class="fa fa-linkedin fa-2x" id="linkedIn"></i></a><a href="https://github.com/staspk"><i class="fa fa-github fa-2x" id="github"></i></a></div>
            </div>
        </div>
    </div>

    
<!--Scripts -->
<script src="js/libraries/jquery-3.4.1.min.js"></script>          <!-- jQuery -->
<script src="js/libraries/dat.gui.min.js"></script>
<script src="js/libraries/jquery-ui.js"></script>
<script src="js/my-star-scripts.js"></script>
<script src="js/utils.js"></script>                               <!-- My Utilities -->
<script src="js/siteScripts.js"></script>                         <!-- My Site Scripts -->



</body>
</html>
